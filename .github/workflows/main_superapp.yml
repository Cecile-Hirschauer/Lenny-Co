name: Build and deploy Lenny & Co to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm --filter @lenny/web build
        env:
          NODE_ENV: production

      # Prépare un dossier deployable avec tout ce qu'Azure a besoin
      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          # Le build Next.js
          cp -r apps/web/.next deploy/
          # Les fichiers statiques publics
          cp -r apps/web/public deploy/
          # Le package.json de l'app web (pour le start script)
          cp apps/web/package.json deploy/
          # Le next.config.js
          cp apps/web/next.config.js deploy/
          # Script de démarrage pour Azure
          cat > deploy/package.json << 'EOF'
          {
            "name": "lenny-co-web",
            "version": "1.0.0",
            "scripts": {
              "start": "next start -p 8080"
            },
            "dependencies": {
              "next": "^14.2.0",
              "react": "^18.3.0",
              "react-dom": "^18.3.0"
            }
          }
          EOF
          # node_modules de l'app (Next.js standalone est plus propre, voir note ci-dessous)
          cd deploy && npm install --omit=dev

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_15FD79D38CB64625931CC5BCAA1FC9E6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_977DDCDEEEA64E428589B4D9C0D1095E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6B3954B9B4A845B6BD2D9594008125CF }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'superapp'
          slot-name: 'Production'
          package: .
